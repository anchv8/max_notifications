name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows binary
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o max-notification.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: max-notification.exe
          generate_release_notes: true

      - name: Notify admins in MAX
        env:
          MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
          MAX_ADMIN_IDS: ${{ secrets.MAX_ADMIN_IDS }}
          VERSION: ${{ github.ref_name }}
        run: |
          IFS=',' read -ra IDS <<< "$MAX_ADMIN_IDS"
          for ID in "${IDS[@]}"; do
            curl -s -X POST "https://botapi.max.ru/messages?user_id=$ID" \
              -H "Authorization: $MAX_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"🚀 Вышла новая версия бота: $VERSION\nСкачать: /update\"}"
          done
